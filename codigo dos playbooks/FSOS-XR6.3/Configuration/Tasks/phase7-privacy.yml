      }
      $global:LASTEXITCODE = 0

  - !powerShell:
    wait: true
    errorAction: Ignore
    command: |
      $regPath = 'HKLM:\SOFTWARE\FrameSyncLabs\FSOS-X'
      if (-not (Test-Path $regPath)) {
        New-Item -Path $regPath -Force -ErrorAction SilentlyContinue | Out-Null
      }
      Set-ItemProperty -Path $regPath -Name 'Installed' -Value 1 -Type DWord -Force -ErrorAction SilentlyContinue
      Set-ItemProperty -Path $regPath -Name 'Version' -Value 'R6.3' -Type String -Force -ErrorAction SilentlyContinue
      Set-ItemProperty -Path $regPath -Name 'Edition' -Value 'EarlyAccess' -Type String -Force -ErrorAction SilentlyContinue
      $stamp = (Get-Date -Format 'yyyyMMddHHmmss')
      Set-ItemProperty -Path $regPath -Name 'AppliedAt' -Value $stamp -Type String -Force -ErrorAction SilentlyContinue
      $sigBase = 'FSOSX-' + $stamp + '-R6.3'
      $bytes = [System.Text.Encoding]::UTF8.GetBytes($sigBase)
      $sha = [System.Security.Cryptography.SHA256]::Create()
      $hash = $sha.ComputeHash($bytes)
      $hex = -join ($hash | ForEach-Object { $_.ToString('x2') })
      Set-ItemProperty -Path $regPath -Name 'Signature' -Value $hex -Type String -Force -ErrorAction SilentlyContinue
      $sha.Dispose()
      $global:LASTEXITCODE = 0
  - !powerShell:
      wait: true
      exeDir: true
      errorAction: Ignore
      command: >-
        .\crossdevice-neuter.ps1
