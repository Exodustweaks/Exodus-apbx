  - !powerShell:
    wait: true
    errorAction: Ignore
    command: |
      $vals = @('RawMouseThrottleEnabled','RawMouseThrottleForced','RawMouseThrottleDuration','RawMouseThrottleLeeway')
      $roots = @('Registry::HKU\.DEFAULT\Control Panel\Mouse')
      Get-ChildItem 'Registry::HKU' -ErrorAction SilentlyContinue | Where-Object { $_.PSChildName -match '^S-1-5-21-' -and $_.PSChildName -notlike '*_Classes' } | ForEach-Object { $roots += ('Registry::' + $_.Name + '\Control Panel\Mouse') }
      foreach ($r in $roots) {
        if (Test-Path $r) {
          foreach ($v in $vals) {
            try { Remove-ItemProperty -Path $r -Name $v -Force -ErrorAction SilentlyContinue } catch {}
          }
        }
      }
      $global:LASTEXITCODE = 0

