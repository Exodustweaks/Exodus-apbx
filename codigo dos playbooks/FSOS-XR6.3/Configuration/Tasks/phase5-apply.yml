---
privilege: TrustedInstaller
actions:
  - !writeStatus: {status: "Configuring Shell"}

  - !powerShell:
    exeDir: true
    wait: true
    errorAction: Ignore
    command: |
      New-Item -ItemType Directory -Path """$env:windir\FSOS""" -Force -ErrorAction SilentlyContinue | Out-Null
      if (Test-Path (Join-Path $PWD 'framesync.ico')) {
        Copy-Item -Path (Join-Path $PWD 'framesync.ico') -Destination """$env:windir\FSOS\framesync.ico""" -Force
      }
      if (Test-Path (Join-Path $PWD 'discord.ico')) {
        Copy-Item -Path (Join-Path $PWD 'discord.ico') -Destination """$env:windir\FSOS\discord.ico""" -Force
      }
      $publicDesktop = 'C:\Users\Public\Desktop'
      New-Item -ItemType Directory -Path $publicDesktop -Force -ErrorAction SilentlyContinue | Out-Null
      $fsIcon = Join-Path $env:windir 'FSOS\framesync.ico'
      $dcIcon = Join-Path $env:windir 'FSOS\discord.ico'
      $fsLines = @('[InternetShortcut]', 'URL=https://framesynclabs.com', ('IconFile=' + $fsIcon), 'IconIndex=0')
      $dcLines = @('[InternetShortcut]', 'URL=https://discord.gg/FSL', ('IconFile=' + $dcIcon), 'IconIndex=0')
      Set-Content -Path (Join-Path $publicDesktop 'Get Optimized.url') -Value $fsLines -Encoding ASCII -Force
      Set-Content -Path (Join-Path $publicDesktop 'FSOS Discord.url') -Value $dcLines -Encoding ASCII -Force
      $global:LASTEXITCODE = 0

  - !powerShell:
    exeDir: true
    wait: true
    errorAction: Ignore
    command: |
      $installDir = Join-Path $env:ProgramFiles 'FSOS-X Dash'
      New-Item -ItemType Directory -Path $installDir -Force -ErrorAction SilentlyContinue | Out-Null
      $dstExe = Join-Path $installDir 'FSOS-X Dash.exe'
      $publicDesktop = 'C:\Users\Public\Desktop'
      $lnkPath = Join-Path $publicDesktop 'FSOS-X Dash.lnk'
      Get-Process -Name 'FSOS-X Dash' -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
      Start-Sleep -Milliseconds 750
      $staleIcon = Join-Path $installDir 'app.ico'
      if (Test-Path $staleIcon) { Remove-Item -Path $staleIcon -Force -ErrorAction SilentlyContinue }
      if (Test-Path $lnkPath) { Remove-Item -Path $lnkPath -Force -ErrorAction SilentlyContinue }
      if (Test-Path $dstExe) { Remove-Item -Path $dstExe -Force -ErrorAction SilentlyContinue }
      $src = Join-Path $PWD 'FSOSXDash.exe'
      if (Test-Path $src) {
        Copy-Item -Path $src -Destination $dstExe -Force -ErrorAction SilentlyContinue
      }
      New-Item -ItemType Directory -Path $publicDesktop -Force -ErrorAction SilentlyContinue | Out-Null
      $shell = New-Object -ComObject WScript.Shell
      $sc = $shell.CreateShortcut($lnkPath)
      $sc.TargetPath = $dstExe
      $sc.WorkingDirectory = $installDir
      $sc.IconLocation = $dstExe + ',0'
      $sc.Description = 'FSOS-X Dash'
      $sc.Save()
      $global:LASTEXITCODE = 0
  - !powerShell:
    exeDir: true
    wait: true
    errorAction: Ignore
    command: |
      $marker = Join-Path $env:windir 'FSOS\.personalization-applied'
      if (Test-Path $marker) { $global:LASTEXITCODE = 0; return }
      $dest = Join-Path $env:windir 'Web\Wallpaper\FSOS'
      New-Item -ItemType Directory -Path $dest -Force -ErrorAction SilentlyContinue | Out-Null
      $wp = Join-Path $PWD 'wallpaper.png'
      $ls = Join-Path $PWD 'lockscreen.png'
      if (Test-Path $wp) { Copy-Item -Path $wp -Destination (Join-Path $dest 'wallpaper.png') -Force -ErrorAction SilentlyContinue }
      if (Test-Path $ls) { Copy-Item -Path $ls -Destination (Join-Path $dest 'lockscreen.png') -Force -ErrorAction SilentlyContinue }
      $global:LASTEXITCODE = 0

  - !registryValue: {path: 'HKU\.DEFAULT\Control Panel\Desktop', value: 'JPEGImportQuality', type: REG_DWORD, data: '100'}
  - !powerShell:
      wait: true
      errorAction: Ignore
      command: |
        Get-ChildItem 'Registry::HKU' | Where-Object { $_.PSChildName -match '^S-1-5-21-' -and $_.PSChildName -notlike '*_Classes' } | ForEach-Object {
          $k = 'Registry::' + $_.Name + '\Control Panel\Desktop'
          if (Test-Path $k) {
            try { Set-ItemProperty -Path $k -Name 'JPEGImportQuality' -Value 100 -Type DWord -Force -ErrorAction SilentlyContinue } catch {}
          }
        }
        $global:LASTEXITCODE = 0
  - !powerShell:
    wait: true
    errorAction: Ignore
    command: |
      $marker = Join-Path $env:windir 'FSOS\.personalization-applied'
      if (Test-Path $marker) { $global:LASTEXITCODE = 0; return }
      $deskKey = 'Registry::HKU\.DEFAULT\Control Panel\Desktop'
      New-Item -Path $deskKey -Force -ErrorAction SilentlyContinue | Out-Null
      Set-ItemProperty -Path $deskKey -Name 'Wallpaper' -Value '%SystemRoot%\Web\Wallpaper\FSOS\wallpaper.png' -Type String -Force -ErrorAction SilentlyContinue
      Set-ItemProperty -Path $deskKey -Name 'WallpaperStyle' -Value '10' -Type String -Force -ErrorAction SilentlyContinue
      Set-ItemProperty -Path $deskKey -Name 'TileWallpaper' -Value '0' -Type String -Force -ErrorAction SilentlyContinue
      $persKey = 'Registry::HKLM\SOFTWARE\Policies\Microsoft\Windows\Personalization'
      New-Item -Path $persKey -Force -ErrorAction SilentlyContinue | Out-Null
      Set-ItemProperty -Path $persKey -Name 'LockScreenImagePath' -Value '%SystemRoot%\Web\Wallpaper\FSOS\lockscreen.png' -Type String -Force -ErrorAction SilentlyContinue
      Set-ItemProperty -Path $persKey -Name 'LockScreenImageUrl' -Value '%SystemRoot%\Web\Wallpaper\FSOS\lockscreen.png' -Type String -Force -ErrorAction SilentlyContinue
      $global:LASTEXITCODE = 0

  - !powerShell:
    wait: true
    errorAction: Ignore
    command: |
      $marker = Join-Path $env:windir 'FSOS\.personalization-applied'
      if (Test-Path $marker) { $global:LASTEXITCODE = 0; return }
      $opts = @()
      $optsFile = Join-Path $env:windir 'FSOS\fsos-options.txt'
      if (Test-Path $optsFile) { $opts = Get-Content $optsFile -ErrorAction SilentlyContinue }
      $hkcuPath = 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Taskband\AuxilliaryPins'
      $hkdefPath = 'Registry::HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\Explorer\Taskband\AuxilliaryPins'
      foreach ($p in @($hkcuPath, $hkdefPath)) {
        if (-not (Test-Path $p)) { New-Item -Path $p -Force -ErrorAction SilentlyContinue | Out-Null }
      }
      $bothHives = @(
        'TaskViewPin','OutlookWebPin','WidgetsPin','ChatPin','MailPin','OutlookPin','CopilotPin'
      )
      $hkcuOnly = @(
        'CopilotPWAPin','LinkedInPin','DevHomePin','NotepadPin','PhotosPin','GetStartedPin','SettingsPin','SnippingToolPin'
      )
      foreach ($n in $bothHives) {
        Set-ItemProperty -Path $hkcuPath -Name $n -Value 0 -Type DWord -Force -ErrorAction SilentlyContinue
        Set-ItemProperty -Path $hkdefPath -Name $n -Value 0 -Type DWord -Force -ErrorAction SilentlyContinue
      }
      foreach ($n in $hkcuOnly) {
        Set-ItemProperty -Path $hkcuPath -Name $n -Value 0 -Type DWord -Force -ErrorAction SilentlyContinue
      }
      if ($opts -contains 'remove-xbox') {
        Set-ItemProperty -Path $hkcuPath -Name 'XboxPin' -Value 0 -Type DWord -Force -ErrorAction SilentlyContinue
      }
      if ($opts -contains 'remove-store') {
        Set-ItemProperty -Path $hkcuPath -Name 'StorePin' -Value 0 -Type DWord -Force -ErrorAction SilentlyContinue
        Set-ItemProperty -Path $hkdefPath -Name 'StorePin' -Value 0 -Type DWord -Force -ErrorAction SilentlyContinue
      }
      if ($opts -contains 'remove-edge') {
        Set-ItemProperty -Path $hkcuPath -Name 'EdgePin' -Value 0 -Type DWord -Force -ErrorAction SilentlyContinue
        Set-ItemProperty -Path $hkdefPath -Name 'EdgePin' -Value 0 -Type DWord -Force -ErrorAction SilentlyContinue
      }
      $global:LASTEXITCODE = 0

  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\ImmersiveShell', value: 'SignInMode', type: REG_DWORD, data: '1'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Device', value: 'DevicePasswordLessBuildVersion', type: REG_DWORD, data: '2'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\ImmersiveShell', value: 'TabletMode', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer', value: 'DisableEdgeDesktopShortcutCreation', type: REG_DWORD, data: '1', option: "remove-edge"}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer', value: 'ShowRecommendations', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer', value: 'EnablePrelaunch', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Schedule\Maintenance', value: 'MaintenanceDisabled', type: REG_DWORD, data: '1'}

  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'Start_ShowFrequentList', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Lighting', value: 'AmbientLightingEnabled', type: REG_DWORD, data: '0', option: "fs-no-dynamiclighting"}
  - !registryValue: {path: 'HKCU\System\GameConfigStore', value: 'GameDVR_Enabled', type: REG_DWORD, data: '0', option: "remove-xbox"}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\GameDVR', value: 'AppCaptureEnabled', type: REG_DWORD, data: '0', option: "remove-xbox"}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'Start_AccountNotifications', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Lighting', value: 'AmbientLightingEnabled', type: REG_DWORD, data: '0', option: "fs-no-dynamiclighting"}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Accent', value: 'StartColorMenu', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'EnableSnapAssistFlyoutOnHover', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Lighting', value: 'UseSystemAccentColor', type: REG_DWORD, data: '0', option: "fs-no-dynamiclighting"}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'EnableSnapAssistFlyout', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\SmartActionPlatform\ActionManager\Installed\System.DescribeImage', value: 'Enabled', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Lighting', value: 'ControlledByForegroundApp', type: REG_DWORD, data: '0', option: "fs-no-dynamiclighting"}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\TabletTip\1.7', value: 'EnableAutocorrection', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'Start_ShowRecentList', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'SnapAssist', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'MultiTaskingAltTabFilter', type: REG_DWORD, data: '3'}
  - !registryValue: {path: 'HKCU\Control Panel\UnsupportedHardwareNotificationCache', value: 'SV2', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'SnapFill', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\PushNotifications', value: 'ToastEnabled', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\Software\Microsoft\GameBar', value: 'UseNexusForGameBarEnabled', type: REG_DWORD, data: '0', option: "remove-xbox"}
  - !registryValue: {path: 'HKCU\Software\Classes\Local Settings\Software\Microsoft\Windows\Shell\Bags\AllFolders\Shell', value: 'FolderType', type: REG_SZ, data: 'NotSpecified'}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'EnableSnapBar', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\TabletTip\1.7', value: 'EnableSpellchecking', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'JointResize', type: REG_DWORD, data: '0'}

  - !powerShell:
    option: "fs-darkmode"
    wait: true
    errorAction: Ignore
    command: |
      $marker = Join-Path $env:windir 'FSOS\.personalization-applied'
      if (Test-Path $marker) { $global:LASTEXITCODE = 0; return }
      $hkcu = 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize'
      $hkdef = 'Registry::HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize'
      foreach ($p in @($hkcu, $hkdef)) {
        if (-not (Test-Path $p)) { New-Item -Path $p -Force -ErrorAction SilentlyContinue | Out-Null }
        Set-ItemProperty -Path $p -Name 'SystemUsesLightTheme' -Value 0 -Type DWord -Force -ErrorAction SilentlyContinue
        Set-ItemProperty -Path $p -Name 'AppsUseLightTheme' -Value 0 -Type DWord -Force -ErrorAction SilentlyContinue
        Set-ItemProperty -Path $p -Name 'ColorPrevalence' -Value 0 -Type DWord -Force -ErrorAction SilentlyContinue
      }
      $global:LASTEXITCODE = 0

  - !powerShell:
      option: "fs-darkmode"
      exeDir: true
      wait: true
      command: '.\apply-darkmode.ps1'

  - !powerShell:
    option: "fs-notransparency"
    wait: true
    errorAction: Ignore
    command: |
      $marker = Join-Path $env:windir 'FSOS\.personalization-applied'
      if (Test-Path $marker) { $global:LASTEXITCODE = 0; return }
      $sids = @('.DEFAULT')
      try {
        $sids += (Get-ChildItem 'Registry::HKEY_USERS' -ErrorAction SilentlyContinue |
          Where-Object { $_.PSChildName -match '^S-1-5-21-' -and $_.PSChildName -notmatch '_Classes$' } |
          ForEach-Object { $_.PSChildName })
      } catch {}
      foreach ($sid in $sids) {
        $key = 'Registry::HKEY_USERS\' + $sid + '\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize'
        if (-not (Test-Path $key)) { New-Item -Path $key -Force -ErrorAction SilentlyContinue | Out-Null }
        Set-ItemProperty -Path $key -Name 'EnableTransparency' -Value 0 -Type DWord -Force -ErrorAction SilentlyContinue
      }
      $global:LASTEXITCODE = 0

  - !powerShell:
    command: '.\\set-wallpaper.ps1 -Mode Desktop -ImagePath $env:systemroot\Web\Wallpaper\FSOS\wallpaper.png'
    exeDir: true
    runas: currentUserElevated
    wait: true
    weight: 40
  - !powerShell:
    command: '.\\set-wallpaper.ps1 -Mode LockScreen -ImagePath $env:systemroot\Web\Wallpaper\FSOS\lockscreen.png'
    exeDir: true
    runas: currentUserElevated
    wait: true
    weight: 40

  - !registryValue: {path: 'HKLM\SOFTWARE\Classes\CLSID\{86ca1aa0-34aa-4e8b-a509-50c905bae2a2}\InprocServer32', value: '', type: REG_SZ, data: '', option: "fs-w10-context"}
  - !registryValue: {path: 'HKCU\Software\Classes\CLSID\{86ca1aa0-34aa-4e8b-a509-50c905bae2a2}\InprocServer32', value: '', type: REG_SZ, data: '', option: "fs-w10-context"}

  - !powerShell:
    wait: true
    errorAction: Ignore
    command: |
      $marker = Join-Path $env:windir 'FSOS\.personalization-applied'
      if (Test-Path $marker) { $global:LASTEXITCODE = 0; return }
      $ifeoRoot = 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options'
      foreach ($exe in @('StartMenuExperienceHost.exe','SearchHost.exe')) {
        $p = Join-Path $ifeoRoot $exe
        if (-not (Test-Path $p)) { New-Item -Path $p -Force -ErrorAction SilentlyContinue | Out-Null }
        Set-ItemProperty -Path $p -Name 'Debugger' -Value '%SystemRoot%\System32\taskkill.exe' -Type String -Force -ErrorAction SilentlyContinue
      }
      Get-Process -Name 'StartMenuExperienceHost' -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
      Get-Process -Name 'SearchHost' -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
      Start-Sleep -Milliseconds 600
      foreach ($exe in @('StartMenuExperienceHost.exe','SearchHost.exe')) {
        $p = Join-Path $ifeoRoot $exe
        Remove-ItemProperty -Path $p -Name 'Debugger' -Force -ErrorAction SilentlyContinue
        Remove-Item -Path $p -Recurse -Force -ErrorAction SilentlyContinue
      }
      $global:LASTEXITCODE = 0
  - !appx: {operation: clearCache, name: '*MicrosoftWindows.Client.CBS*'}

  - !writeStatus: {status: "Cleaning Start and Taskbar"}

  - !powerShell:
    wait: true
    errorAction: Ignore
    command: |
      $marker = Join-Path $env:windir 'FSOS\.personalization-applied'
      if (Test-Path $marker) { $global:LASTEXITCODE = 0; return }
      Remove-ItemProperty -Path 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\StuckRects3' -Name 'Settings' -Force -ErrorAction SilentlyContinue
      Remove-ItemProperty -Path 'Registry::HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\Explorer\StuckRects3' -Name 'Settings' -Force -ErrorAction SilentlyContinue
      $hkcuAdv = 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced'
      $hkdefAdv = 'Registry::HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced'
      foreach ($p in @($hkcuAdv, $hkdefAdv)) {
        if (-not (Test-Path $p)) { New-Item -Path $p -Force -ErrorAction SilentlyContinue | Out-Null }
        Set-ItemProperty -Path $p -Name 'ShowTaskViewButton' -Value 0 -Type DWord -Force -ErrorAction SilentlyContinue
        Set-ItemProperty -Path $p -Name 'Start_TrackDocs' -Value 0 -Type DWord -Force -ErrorAction SilentlyContinue
        Set-ItemProperty -Path $p -Name 'Start_IrisRecommendations' -Value 0 -Type DWord -Force -ErrorAction SilentlyContinue
        Set-ItemProperty -Path $p -Name 'Start_TrackProgs' -Value 0 -Type DWord -Force -ErrorAction SilentlyContinue
        Set-ItemProperty -Path $p -Name 'Start_Layout' -Value 1 -Type DWord -Force -ErrorAction SilentlyContinue
      }
      $polExp = 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\Explorer'
      if (-not (Test-Path $polExp)) { New-Item -Path $polExp -Force -ErrorAction SilentlyContinue | Out-Null }
      Set-ItemProperty -Path $polExp -Name 'HideTaskViewButton' -Value 1 -Type DWord -Force -ErrorAction SilentlyContinue
      Set-ItemProperty -Path $polExp -Name 'HideRecommendedSection' -Value 1 -Type DWord -Force -ErrorAction SilentlyContinue
      Set-ItemProperty -Path $polExp -Name 'ShowOrHideMostUsedApps' -Value 2 -Type DWord -Force -ErrorAction SilentlyContinue
      Set-ItemProperty -Path $polExp -Name 'HideRecommendedPersonalizedSites' -Value 1 -Type DWord -Force -ErrorAction SilentlyContinue
      $polExp2 = 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer'
      if (-not (Test-Path $polExp2)) { New-Item -Path $polExp2 -Force -ErrorAction SilentlyContinue | Out-Null }
      Set-ItemProperty -Path $polExp2 -Name 'NoStartMenuMFUprogramsList' -Value 1 -Type DWord -Force -ErrorAction SilentlyContinue
      $pmEdu = 'HKLM:\SOFTWARE\Microsoft\PolicyManager\current\device\Education'
      if (-not (Test-Path $pmEdu)) { New-Item -Path $pmEdu -Force -ErrorAction SilentlyContinue | Out-Null }
      Set-ItemProperty -Path $pmEdu -Name 'IsEducationEnvironment' -Value 1 -Type DWord -Force -ErrorAction SilentlyContinue
      $pmStart = 'HKLM:\SOFTWARE\Microsoft\PolicyManager\current\device\Start'
      if (-not (Test-Path $pmStart)) { New-Item -Path $pmStart -Force -ErrorAction SilentlyContinue | Out-Null }
      Set-ItemProperty -Path $pmStart -Name 'HideRecommendedSection' -Value 1 -Type DWord -Force -ErrorAction SilentlyContinue
      $global:LASTEXITCODE = 0

  - !powerShell:
    wait: true
    errorAction: Ignore
    command: |
      $marker = Join-Path $env:windir 'FSOS\.personalization-applied'
      if (Test-Path $marker) { $global:LASTEXITCODE = 0; return }
      $json = '{"applyOnce":true,"pinnedList":[{"packagedAppId":"windows.immersivecontrolpanel_cw5n1h2txyewy!microsoft.windows.immersivecontrolpanel"},{"desktopAppLink":"%APPDATA%\\Microsoft\\Windows\\Start Menu\\Programs\\File Explorer.lnk"},{"packagedAppId":"Microsoft.WindowsNotepad_8wekyb3d8bbwe!App"},{"packagedAppId":"Microsoft.ScreenSketch_8wekyb3d8bbwe!App"}]}'
      $pmCurrent = 'HKLM:\SOFTWARE\Microsoft\PolicyManager\current\device\Start'
      $pmProvider = 'HKLM:\SOFTWARE\Microsoft\PolicyManager\providers\B5292708-1619-419B-9923-E5D9F3925E71\default\Device\Start'
      foreach ($p in @($pmCurrent, $pmProvider)) {
        if (-not (Test-Path $p)) { New-Item -Path $p -Force -ErrorAction SilentlyContinue | Out-Null }
      }
      Set-ItemProperty -Path $pmCurrent -Name 'ConfigureStartPins' -Value $json -Type String -Force -ErrorAction SilentlyContinue
      Set-ItemProperty -Path $pmCurrent -Name 'ConfigureStartPins_WinningProvider' -Value 'B5292708-1619-419B-9923-E5D9F3925E71' -Type String -Force -ErrorAction SilentlyContinue
      Set-ItemProperty -Path $pmProvider -Name 'ConfigureStartPins' -Value $json -Type String -Force -ErrorAction SilentlyContinue
      Set-ItemProperty -Path $pmCurrent -Name 'ConfigureStartPins_ProviderSet' -Value 1 -Type DWord -Force -ErrorAction SilentlyContinue
      $global:LASTEXITCODE = 0


  - !powerShell:
    wait: true
    errorAction: Ignore
    command: |
      $marker = Join-Path $env:windir 'FSOS\.personalization-applied'
      if (Test-Path $marker) { $global:LASTEXITCODE = 0; return }
      $userHives = @()
      Get-ChildItem 'Registry::HKEY_USERS' -ErrorAction SilentlyContinue | ForEach-Object {
        $name = $_.PSChildName
        if ($name -match '^S-1-5-21-' -and $name -notlike '*_Classes' -or $name -like 'AME_UserHive_*' -or $name -eq '.DEFAULT') {
          $userHives += $name
        }
      }
      foreach ($hive in $userHives) {
        $cacheRoot = """Registry::HKEY_USERS\$hive\SOFTWARE\Microsoft\Windows\CurrentVersion\CloudStore\Store\Cache\DefaultAccount"""
        if (Test-Path $cacheRoot) {
          Get-ChildItem -Path $cacheRoot -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match 'start\.tilegrid' } |
            ForEach-Object { Remove-Item -Path $_.PSPath -Recurse -Force -ErrorAction SilentlyContinue }
        }
        $startKey = """Registry::HKEY_USERS\$hive\Software\Microsoft\Windows\CurrentVersion\Start"""
        if (Test-Path $startKey) {
          Remove-ItemProperty -Path $startKey -Name 'Config' -Force -ErrorAction SilentlyContinue
        }
      }
      $global:LASTEXITCODE = 0

  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Search', value: 'SearchboxTaskbarMode', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\Search', value: 'SearchboxTaskbarMode', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'TaskbarMn', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'TaskbarMn', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'ShowCopilotButton', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'ShowCopilotButton', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'IsEnabled', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKU\.DEFAULT\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'IsEnabled', type: REG_DWORD, data: '0'}
  - !powerShell:
      wait: true
      errorAction: Ignore
      command: |
        $sids = Get-ChildItem -Path 'Registry::HKU' -ErrorAction SilentlyContinue | Where-Object {
          ($_.PSChildName -match '^S-1-5-21-' -and $_.PSChildName -notmatch '_Classes$') -or $_.PSChildName -match '^AME_UserHive_' -or $_.PSChildName -eq '.DEFAULT'
        }
        foreach ($s in $sids) {
          $k = 'Registry::HKU\' + $s.PSChildName + '\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced'
          New-Item -Path $k -Force -ErrorAction SilentlyContinue | Out-Null
          Set-ItemProperty -Path $k -Name 'TaskbarDa' -Value 0 -Type DWord -Force -ErrorAction SilentlyContinue
        }
