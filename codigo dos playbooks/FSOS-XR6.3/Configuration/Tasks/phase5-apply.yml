    command: |
      $label = 'FSOS-X R6.3'
      try {
        $installEpoch = (Get-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion' -Name 'InstallDate' -ErrorAction SilentlyContinue).InstallDate
        if ($installEpoch) {
          $installUtc = [System.DateTimeOffset]::FromUnixTimeSeconds([System.Int64]$installEpoch).UtcDateTime
          $ageHours = ((Get-Date).ToUniversalTime() - $installUtc).TotalHours
          if ($ageHours -gt 40) { $label = 'FSOS-X R6.3 EXP' }
        }
      } catch {}
      bcdedit /set description """$label"""
      Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\OEMInformation' -Name 'Model' -Value $label
      Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion' -Name 'RegisteredOrganization' -Value $label
      $global:LASTEXITCODE = 0
