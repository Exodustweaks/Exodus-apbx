  - !registryValue: {path: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Notifications\Settings', value: 'NOC_GLOBAL_SETTING_BADGE_ENABLED', type: REG_DWORD, data: '0'}

  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\WcmSvc\GroupPolicy', value: 'fMinimizeConnections', type: REG_DWORD, data: '3', option: "disable-wifi"}

  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\MRT', value: 'DontOfferThroughWUAU', type: REG_DWORD, data: '1'}

  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Spynet', value: 'LocalSettingOverrideSpynetReporting', type: REG_DWORD, data: '0', option: "disable-defender"}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Spynet', value: 'DisableBlockAtFirstSeen', type: REG_DWORD, data: '1', option: "disable-defender"}

  - !writeStatus: {status: "Disabling Tracking Services"}
  - !service: {name: 'diagnosticshub.standardcollector.service', operation: change, startup: 4}
  - !service: {name: 'dmwappushservice', operation: change, startup: 4}
  - !service: {name: 'wisvc', operation: change, startup: 4}
