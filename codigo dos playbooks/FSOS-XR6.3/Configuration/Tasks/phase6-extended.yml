      }
      $ntuDefault = 'C:\Users\Default\NTUSER.DAT'
      if (Test-Path $ntuDefault) {
        $loadResult = & reg.exe load 'HKU\FSOS_P_Default' $ntuDefault 2>&1
        if ($LASTEXITCODE -eq 0) {
