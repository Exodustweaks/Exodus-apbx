  - !powerShell:
    wait: true
    errorAction: Ignore
    command: |
      $autoSvcs = @('Schedule','EventLog','RpcSs','RpcEptMapper','DcomLaunch','Winmgmt','LanmanWorkstation','NlaSvc','netprofm','Dnscache','Dhcp')
      $manualSvcs = @('WdiServiceHost','WdiSystemHost','wmiApSrv')
      foreach ($svc in ($autoSvcs + $manualSvcs)) {
        try {
          $k = 'HKLM:\SYSTEM\CurrentControlSet\Services\' + $svc
          if (Test-Path $k) {
            $cur = (Get-ItemProperty -Path $k -Name 'Start' -ErrorAction SilentlyContinue).Start
            if ($svc -in $autoSvcs) {
              if ($cur -ne 2) { Set-ItemProperty -Path $k -Name 'Start' -Value 2 -Type DWord -Force -ErrorAction SilentlyContinue }
            } else {
              if ($cur -ne 3) { Set-ItemProperty -Path $k -Name 'Start' -Value 3 -Type DWord -Force -ErrorAction SilentlyContinue }
            }
          }
        } catch {}
      }
      $global:LASTEXITCODE = 0

  - !powerShell:
    wait: true
    errorAction: Ignore
    command: |
      $marker = Join-Path $env:windir 'FSOS\.personalization-applied'
      if (Test-Path $marker) { $global:LASTEXITCODE = 0; return }
      $programDirs = New-Object System.Collections.Generic.List[string]
      $programDirs.Add((Join-Path $env:ProgramData 'Microsoft\Windows\Start Menu\Programs'))
      $programDirs.Add((Join-Path $env:SystemDrive 'Users\Default\AppData\Roaming\Microsoft\Windows\Start Menu\Programs'))
      $profileList = 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\ProfileList'
      Get-ChildItem $profileList -ErrorAction SilentlyContinue | Where-Object { $_.PSChildName -match '^S-1-5-21-' } | ForEach-Object {
        $pp = (Get-ItemProperty -Path $_.PSPath -Name 'ProfileImagePath' -ErrorAction SilentlyContinue).ProfileImagePath
        if ($pp -and (Test-Path $pp)) {
          $programDirs.Add((Join-Path $pp 'AppData\Roaming\Microsoft\Windows\Start Menu\Programs'))
        }
      }
      $shell = New-Object -ComObject WScript.Shell
      foreach ($dir in $programDirs) {
        if (-not (Test-Path $dir)) { continue }
        Get-ChildItem -Path $dir -Filter '*.lnk' -Recurse -Force -ErrorAction SilentlyContinue | ForEach-Object {
          $lnkPath = $_.FullName
          try {
            $sc = $shell.CreateShortcut($lnkPath)
            $tp = $sc.TargetPath
            if ([string]::IsNullOrWhiteSpace($tp)) {
              Remove-Item -LiteralPath $lnkPath -Force -ErrorAction SilentlyContinue
            }
          } catch {}
        }
        Get-ChildItem -Path $dir -Recurse -Force -Directory -ErrorAction SilentlyContinue | Sort-Object -Property FullName -Descending | ForEach-Object {
          if ($_.Name -ieq 'Startup') { return }
          if (-not (Get-ChildItem -Path $_.FullName -Recurse -Force -ErrorAction SilentlyContinue)) {
            Remove-Item -LiteralPath $_.FullName -Force -ErrorAction SilentlyContinue
          }
        }
      }
      [System.Runtime.InteropServices.Marshal]::ReleaseComObject($shell) | Out-Null
      Get-Process -Name 'StartMenuExperienceHost' -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
      $userHives = @()
      Get-ChildItem 'Registry::HKEY_USERS' -ErrorAction SilentlyContinue | ForEach-Object {
        $name = $_.PSChildName
        if (($name -match '^S-1-5-21-' -and $name -notlike '*_Classes') -or $name -like 'AME_UserHive_*' -or $name -eq '.DEFAULT') {
          $userHives += $name
        }
      }
      foreach ($hive in $userHives) {
        $cacheRoot = 'Registry::HKEY_USERS\' + $hive + '\SOFTWARE\Microsoft\Windows\CurrentVersion\CloudStore\Store\Cache\DefaultAccount'
        if (Test-Path $cacheRoot) {
          Get-ChildItem -Path $cacheRoot -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Name -match 'start\.tilegrid' } | ForEach-Object {
            Remove-Item -Path $_.PSPath -Recurse -Force -ErrorAction SilentlyContinue
          }
        }
      }
      $global:LASTEXITCODE = 0
