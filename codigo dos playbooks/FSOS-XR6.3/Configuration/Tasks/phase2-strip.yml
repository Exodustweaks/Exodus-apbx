  - !powerShell:
      option: "remove-bloat"
      wait: true
      errorAction: Ignore
      command: |
        try {
          $publisherPrefixes = @('BlipStudioInc','Disney','SpotifyAB.SpotifyMusic','TikTok','Instagram','Facebook','Netflix','Amazon','HULULLC','iHeartRadio','Pandora','Plex','Shazam','Viber','WinZip','NYTCrossword','Duolingo','Fitbit','Flipboard','XING','EclipseManager','ActiproSoftwareLLC','CyberLinkMediaSuite','PicsArt','PolarrPhotoEditor','PhototasticCollage','DrawboardPDF','AutodeskSketchBook','Wunderlist','TuneInRadio','SlingTV','OneCalendar','ACGMediaPlayer','Sidia.LiveWallpaper','Asphalt8','CaesarsSlotsFreeCasino','COOKINGFEVER','HiddenCity','MarchofEmpires','DisneyMagicKingdoms','RoyalRevolt','FarmVille2','BlipStudio','AppleInc')
          foreach ($prefix in $publisherPrefixes) {
            Get-AppxPackage -AllUsers | Where-Object { $_.Name -like ($prefix + '*') -or $_.PackageFamilyName -like ($prefix + '*') } | ForEach-Object {
              try { Remove-AppxPackage -Package $_.PackageFullName -AllUsers -ErrorAction SilentlyContinue } catch {}
            }
            Get-AppxProvisionedPackage -Online -ErrorAction SilentlyContinue | Where-Object { $_.DisplayName -like ($prefix + '*') -or $_.PackageName -like ($prefix + '*') } | ForEach-Object {
              try { Remove-AppxProvisionedPackage -Online -PackageName $_.PackageName -ErrorAction SilentlyContinue | Out-Null } catch {}
            }
          }
        } catch {}
        $global:LASTEXITCODE = 0

  - !powerShell:
    wait: true
    errorAction: Ignore
    command: |
      $marker = Join-Path $env:windir 'FSOS\.personalization-applied'
      if (Test-Path $marker) { $global:LASTEXITCODE = 0; return }
      $ifeoRoot = 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options'
      foreach ($exe in @('StartMenuExperienceHost.exe','SearchHost.exe')) {
        $p = Join-Path $ifeoRoot $exe
        if (-not (Test-Path $p)) { New-Item -Path $p -Force -ErrorAction SilentlyContinue | Out-Null }
        Set-ItemProperty -Path $p -Name 'Debugger' -Value '%SystemRoot%\System32\taskkill.exe' -Type String -Force -ErrorAction SilentlyContinue
      }
      Get-Process -Name 'StartMenuExperienceHost' -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
      Get-Process -Name 'SearchHost' -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
      Start-Sleep -Milliseconds 600
      foreach ($exe in @('StartMenuExperienceHost.exe','SearchHost.exe')) {
        $p = Join-Path $ifeoRoot $exe
        Remove-ItemProperty -Path $p -Name 'Debugger' -Force -ErrorAction SilentlyContinue
        Remove-Item -Path $p -Recurse -Force -ErrorAction SilentlyContinue
      }
      $global:LASTEXITCODE = 0
