---
privilege: TrustedInstaller
actions:

  - !writeStatus: {status: "Pausing Windows Updates"}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\WindowsUpdate\UX\Settings', value: 'FlightSettingsMaxPauseDays', type: REG_DWORD, data: '3650'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\WindowsUpdate\UX\Settings', value: 'PauseFeatureUpdatesStartTime', type: REG_SZ, data: '2025-01-01T00:00:00Z'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\WindowsUpdate\UX\Settings', value: 'PauseFeatureUpdatesEndTime', type: REG_SZ, data: '2033-01-01T00:00:00Z'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\WindowsUpdate\UX\Settings', value: 'PauseQualityUpdatesStartTime', type: REG_SZ, data: '2025-01-01T00:00:00Z'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\WindowsUpdate\UX\Settings', value: 'PauseQualityUpdatesEndTime', type: REG_SZ, data: '2033-01-01T00:00:00Z'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\WindowsUpdate\UX\Settings', value: 'PauseUpdatesStartTime', type: REG_SZ, data: '2025-01-01T00:00:00Z'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\WindowsUpdate\UX\Settings', value: 'PauseUpdatesExpiryTime', type: REG_SZ, data: '2033-01-01T00:00:00Z'}

  - !powerShell:
    wait: true
    errorAction: Ignore
    command: |
      $snapPath = Join-Path $env:TEMP 'fsos-appx-snapshot.txt'
      (Get-AppxPackage -AllUsers -ErrorAction SilentlyContinue).PackageFamilyName |
        Sort-Object -Unique | Out-File -FilePath $snapPath -Encoding ASCII -Force
      $global:LASTEXITCODE = 0
  - !powerShell:
    wait: true
    errorAction: Ignore
    command: |
      $eolBase = 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Appx\AppxAllUserStore\EndOfLife'
      if (Test-Path $eolBase) {
        try { Remove-Item -Path $eolBase -Recurse -Force -ErrorAction SilentlyContinue } catch {}
      }
      $global:LASTEXITCODE = 0
  - !powerShell:
    runas: currentUserElevated
    wait: true
    errorAction: Ignore
    command: |
      $opts = @()
      $optsFile = Join-Path $env:windir 'FSOS\fsos-options.txt'
      if (Test-Path $optsFile) { $opts = Get-Content $optsFile -ErrorAction SilentlyContinue }
      $unpin = @('Copilot','Microsoft Copilot','Outlook','Outlook (new)','Outlook for Windows','Microsoft Outlook','Dev Home','Phone Link','Microsoft Teams','Teams')
      if ($opts -contains 'remove-xbox') { $unpin += @('Xbox','Game Bar','Xbox Game Bar') }
      if ($opts -contains 'remove-store') { $unpin += @('Microsoft Store') }
      if ($opts -contains 'remove-edge') { $unpin += @('Microsoft Edge','Edge') }
      $shell = New-Object -ComObject Shell.Application
      $apps = $shell.NameSpace('shell:::{4234d49b-0245-4df3-b780-3893943456e1}')
      $apps.Items() | ForEach-Object {
        if ($unpin -contains $_.Name) {
          $_.InvokeVerb('taskbarunpin')
        }
      }
  - !writeStatus: {status: "Removing Bloatware", option: "remove-bloat"}

  - !powerShell:
      option: "remove-bloat"
      wait: true
      errorAction: Ignore
      command: |
        try { Stop-Service -Name 'WidgetService' -Force -ErrorAction SilentlyContinue } catch {}
        foreach ($n in @('Widgets','WidgetService','widgetservice','msedgewebview2','GameInputSvc')) {
          try { Get-Process -Name $n -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue } catch {}
        }
        try { taskkill.exe /F /IM 'msedgewebview2.exe' /T 2>$null | Out-Null } catch {}
        try { taskkill.exe /F /IM 'Widgets.exe' /T 2>$null | Out-Null } catch {}
        try { taskkill.exe /F /IM 'WidgetService.exe' /T 2>$null | Out-Null } catch {}
        Start-Sleep -Milliseconds 500
        $global:LASTEXITCODE = 0

