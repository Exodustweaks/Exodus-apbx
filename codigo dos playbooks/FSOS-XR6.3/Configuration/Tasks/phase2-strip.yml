  - !powerShell:
    option: "remove-accessibility"
    wait: true
    errorAction: Ignore
    command: |
      $wsh = New-Object -ComObject WScript.Shell
      $accExes = @('magnify.exe','narrator.exe','osk.exe','voiceaccess.exe','livecaptions.exe')
      $accPatterns = @('*Magnifier*','*Narrator*','*On-Screen Keyboard*','*On Screen Keyboard*','*Voice access*','*Voice Access*','*Live captions*','*Live Captions*','*Speech Recognition*')
      $roots = New-Object System.Collections.ArrayList
      [void]$roots.Add((Join-Path $env:SystemDrive 'ProgramData\Microsoft\Windows\Start Menu\Programs'))
      [void]$roots.Add((Join-Path $env:SystemDrive 'Users\Default\AppData\Roaming\Microsoft\Windows\Start Menu\Programs'))
      Get-ChildItem (Join-Path $env:SystemDrive 'Users') -Directory -ErrorAction SilentlyContinue | Where-Object { $_.Name -notin @('Public','Default','All Users','WDAGUtilityAccount') } | ForEach-Object { [void]$roots.Add((Join-Path $_.FullName 'AppData\Roaming\Microsoft\Windows\Start Menu\Programs')) }
      foreach ($root in $roots) {
        if (-not (Test-Path $root)) { continue }
        try {
          Get-ChildItem -Path $root -Recurse -Force -File -Filter *.lnk -ErrorAction SilentlyContinue | ForEach-Object {
            $lnk = $_
            $kill = $false
            foreach ($pat in $accPatterns) { if ($lnk.Name -like $pat) { $kill = $true; break } }
            if (-not $kill) {
              try {
                $tp = $wsh.CreateShortcut($lnk.FullName).TargetPath
                if ($tp) { $tb = [System.IO.Path]::GetFileName($tp).ToLower(); if ($accExes -contains $tb) { $kill = $true } }
              } catch {}
            }
            if ($kill) { try { Remove-Item -LiteralPath $lnk.FullName -Force -ErrorAction SilentlyContinue } catch {} }
          }
          Get-ChildItem -Path $root -Recurse -Force -Directory -ErrorAction SilentlyContinue | Where-Object { $_.Name -ieq 'Accessibility' } | ForEach-Object { try { if (-not (Get-ChildItem -LiteralPath $_.FullName -Force -ErrorAction SilentlyContinue)) { Remove-Item -LiteralPath $_.FullName -Recurse -Force -ErrorAction SilentlyContinue } } catch {} }
        } catch {}
      }
      try { Stop-Service -Name 'WSearch' -Force -ErrorAction SilentlyContinue } catch {}
      foreach ($pn in @('SearchIndexer','SearchProtocolHost','SearchFilterHost','SearchHost','SearchApp','StartMenuExperienceHost')) {
        try { Get-Process -Name $pn -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue } catch {}
      }
      $skey = 'HKLM:\SOFTWARE\Microsoft\Windows Search'
      try {
        if (-not (Test-Path $skey)) { New-Item -Path $skey -Force -ErrorAction SilentlyContinue | Out-Null }
        Set-ItemProperty -Path $skey -Name 'SetupCompletedSuccessfully' -Value 0 -Type DWord -Force -ErrorAction SilentlyContinue
      } catch {}
      $idx = Join-Path $env:ProgramData 'Microsoft\Search\Data\Applications\Windows'
      try { if (Test-Path $idx) { Remove-Item -LiteralPath $idx -Recurse -Force -ErrorAction SilentlyContinue } } catch {}
      $global:LASTEXITCODE = 0

