---
actions:
  - !status: {status: 'Initializing'}
  - !cmd: {exeDir: true, command: 'Robocopy Files %SystemDrive%\ /copy:DA /e /nfl /ndl /njh /nc /ns /np >nul'}

  # power Plan
  - !cmd: {command: 'powercfg /import "%CD%\vain.pow" 01010110-0110-0001-0110-100101101110', runas: currentUserElevated, wait: true, exeDir: true}
  - !cmd: {command: 'powercfg /setactive 01010110-0110-0001-0110-100101101110 >nul', runas: currentUserElevated, wait: true}
  - !powerShell: {command: "powercfg -list | ForEach-Object { $guid = $_ -replace '.*Power Scheme GUID: ([a-f0-9-]+).*','$1'; if ($guid -ne $_) { powercfg -delete $guid 2>$null } }", runas: currentUserElevated, wait: true}

  # Disable Smart App Control
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\CI\Policy', value: 'VerifiedAndReputablePolicyState', type: REG_DWORD, data: '0'}

  # Hosts
  - !cmd: {command: 'ipconfig /flushdns >nul'}

  # Dark Theme
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize', value: 'SystemUsesLightTheme', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize', value: 'AppsUseLightTheme', type: REG_DWORD, data: '0'}
  
  # Wallpaper & Lockscreen
  - !status: {status: 'Changing Wallpaper & Lockscreen'}
  - !powerShell: {command: '$path=''C:\Windows\Web\Wallpaper\Vain\img0.jpg''; Get-ChildItem ''Registry::HKU'' | ForEach-Object {$key=$_.Name; [microsoft.win32.registry]::SetValue($key+''\Control Panel\Desktop'',''WallPaper'',$path,[Microsoft.Win32.RegistryValueKind]::String)}; Add-Type -TypeDefinition ''using System.Runtime.InteropServices; public class Wallpaper{[DllImport(\"user32.dll\",CharSet=CharSet.Auto)]public static extern int SystemParametersInfo(int uAction,int uParam,string lpvParam,int fuWinIni);}''; [Wallpaper]::SystemParametersInfo(20,0,$path,3)', runas: currentUserElevated, wait: true}
  - !powerShell: {command: 'Add-Type -AssemblyName System.Runtime.WindowsRuntime; [Windows.Storage.StorageFile,Windows.Storage,ContentType=WindowsRuntime] | Out-Null; [Windows.System.UserProfile.LockScreen,Windows.System.UserProfile,ContentType=WindowsRuntime] | Out-Null; $a=[System.WindowsRuntimeSystemExtensions].GetMethods(); $f=($a|Where-Object{$_.Name -eq ''AsTask'' -and $_.GetParameters()[0].ParameterType.Name -eq ''IAsyncOperation`1''})[0].MakeGenericMethod([Windows.Storage.StorageFile]).Invoke($null,@([Windows.Storage.StorageFile]::GetFileFromPathAsync(''C:\Windows\Web\Wallpaper\Vain\img0.jpg''))).GetAwaiter().GetResult(); ($a|Where-Object{$_.Name -eq ''AsTask'' -and $_.GetParameters()[0].ParameterType.Name -eq ''IAsyncAction''})[0].Invoke($null,@([Windows.System.UserProfile.LockScreen]::SetImageFileAsync($f))).GetAwaiter().GetResult()', runas: currentUserElevated, wait: true}
  - !taskKill: {name: 'explorer'}
  
  # Powershell
  - !status: {status: 'Configuring Powershell'}
  - !cmd: {command: 'setx POWERSHELL_TELEMETRY_OPTOUT 1 >nul'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\PowerShell\1\ShellIds\Microsoft.PowerShell', value: 'ExecutionPolicy', type:  REG_SZ, data: 'Unrestricted'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ModuleLogging', value: 'EnableModuleLogging', type: REG_DWORD, data: '0'} #Turn off Module Logging
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging', value: 'EnableScriptBlockLogging', type: REG_DWORD, data: '0'} #Turn off PowerShell Script Block Logging
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging', value: 'EnableScriptBlockInvocationLogging', type: REG_DWORD, data: '0'} #Turn off PowerShell Script Block Logging

  # Run ps1
  - !cmd: {command: 'ftype Microsoft.PowerShellScript.1="%systemroot%\System32\WindowsPowerShell\v1.0\powershell.exe" -NoLogo -EP Unrestricted -File "%1" %* >nul'}
  - !registryValue: {path: 'HKCR\Microsoft.PowerShellScript.1\Shell', value: '', type:  REG_SZ, data: 'Open'}
  - !registryValue: {path: 'HKCR\Microsoft.PowerShellScript.1\Shell\Open\Command', value: '', type:  REG_EXPAND_SZ, data: '"%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe" "%1"'}
  - !registryValue: {path: 'HKCR\Microsoft.PowerShellScript.1\Shell\RunAs', value: 'HasLUAShield', type:  REG_SZ, data: ''}
  - !registryValue: {path: 'HKCR\Microsoft.PowerShellScript.1\Shell\RunAs\Command', value: '', type:  REG_EXPAND_SZ, data: '"%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe" "%1"'}
  - !registryValue: {path: 'HKCR\.psm1', value: '', type:  REG_SZ, data: 'Microsoft.PowerShellModule.1'}
  - !registryValue: {path: 'HKCR\Microsoft.PowerShellModule.1\Shell', value: '', type:  REG_SZ, data: 'Open'}
  - !registryKey: {path: 'HKCR\.psm1\OpenWithProgids'}
  - !registryKey: {path: 'HKCR\.ps1\OpenWithProgids'}

  # Ngen
  - !status: {status: 'Installing NGEN'}
  - !powerShell: {command: '$env:PATH="$([Runtime.InteropServices.RuntimeEnvironment]::GetRuntimeDirectory());$env:PATH";foreach($a in [AppDomain]::CurrentDomain.GetAssemblies()){if($a.Location){ngen install $a.Location /nologo 2>&1 | Out-Null}}'}

  # User PFP
  - !powerShell:
    command: 'Add-Type -AssemblyName System.Drawing; $img = [System.Drawing.Image]::FromFile((Join-Path $PWD ''user.png'')); $dest = [Environment]::GetFolderPath(''CommonApplicationData'') + ''\Microsoft\User Account Pictures\''; @{''user.png''=448;''user.bmp''=448;''guest.png''=448;''guest.bmp''=448;''user-192.png''=192;''user-48.png''=48;''user-40.png''=40;''user-32.png''=32}.GetEnumerator() | ForEach-Object { $b = New-Object System.Drawing.Bitmap($_.Value,$_.Value); $g = [System.Drawing.Graphics]::FromImage($b); $g.DrawImage($img,0,0,$_.Value,$_.Value); $b.Save($dest + $_.Key); $g.Dispose(); $b.Dispose() }; $img.Dispose()'
    runas: currentUserElevated
    exeDir: true
    wait: true
    
  - !powerShell:
    command: 'Add-Type -AssemblyName System.Drawing; $img = [System.Drawing.Image]::FromFile((Join-Path $PWD ''user.png'')); $sid = (New-Object System.Security.Principal.NTAccount($env:USERNAME)).Translate([System.Security.Principal.SecurityIdentifier]).Value; $dest = ''C:\Users\Public\AccountPictures\'' + $sid; if (!(Test-Path $dest)) { New-Item -Path $dest -ItemType Directory -Force }; $regPath = ''HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\AccountPicture\Users\'' + $sid; if (!(Test-Path $regPath)) { New-Item -Path $regPath -Force }; @(1080,448,424,240,208,192,96,64,48,40,32) | ForEach-Object { $b = New-Object System.Drawing.Bitmap($_,$_); $g = [System.Drawing.Graphics]::FromImage($b); $g.InterpolationMode = [System.Drawing.Drawing2D.InterpolationMode]::HighQualityBicubic; $g.DrawImage($img,0,0,$_,$_); $f = $dest + ''\Image'' + $_ + ''.png''; $b.Save($f,[System.Drawing.Imaging.ImageFormat]::Png); $g.Dispose(); $b.Dispose(); Set-ItemProperty -Path $regPath -Name (''Image'' + $_) -Value $f -Type String }; $img.Dispose()'
    exeDir: true
    wait: true
    
  # Remove W11 Notepad
  - !appx: {name: 'Microsoft.WindowsNotepad*', type: family}

  # Notifications
  - !status: {status: 'Disabling Notifications'}
  - !service: {name: 'WpnService', operation: change, startup: 4}
  - !service: {name: "WpnService", operation: stop}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\userNotificationListener', value: 'Value', type: REG_SZ, data: 'Deny'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\PushNotifications', value: 'ToastEnabled', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows\CurrentVersion\PushNotifications', value: 'NoCloudApplicationNotification', type: REG_DWORD, data: '1'} #Turn off notifications network usage
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Advanced', value: 'ShowSyncProviderNotifications', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Notifications\Settings', value: 'NOC_GLOBAL_SETTING_ALLOW_NOTIFICATION_SOUND', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Notifications\Settings', value: 'NOC_GLOBAL_SETTING_ALLOW_CRITICAL_TOASTS_ABOVE_LOCK', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Notifications\Settings', value: 'NOC_GLOBAL_SETTING_ALLOW_TOASTS_ABOVE_LOCK', type: REG_DWORD, data: '0'}
  - !taskKill: {name: 'SystemSettings'}
  - !taskKill: {name: 'ShellExperienceHost'}

  # Defender
  - !status: {status: 'Removing Windows Defender'}
  - !taskKill: {name: "NisSrv"}
  - !taskKill: {name: "SecurityHealthHost"}
  - !taskKill: {name: "SecurityHealthService"}
  - !taskKill: {name: "SecurityHealthSystray"}
  - !taskKill: {name: "SkypeBackgroundHost"}
  - !taskKill: {name: "MsMpEng"}
  - !taskKill: {name: "msiexec"}
  - !taskKill: {name: "smartscreen"}
  - !appx: {name: '*SecHealthUI*', type: family}
  - !appx: {name: 'Microsoft.Windows.Apprep.ChxApp*', type: family}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Microsoft Antimalware\Real-Time Protection', value: 'DisableScanOnRealtimeEnable', type: REG_DWORD, data: '1'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Microsoft Antimalware\Real-Time Protection', value: 'DisableOnAccessProtection', type: REG_DWORD, data: '1'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection', value: 'DisableScanOnRealtimeEnable', type: REG_DWORD, data: '1'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection', value: 'DisableBehaviorMonitoring', type: REG_DWORD, data: '1'}
  - !registryValue: {path: 'HKLM\Software\Policies\Microsoft\MicrosoftEdge\PhishingFilter', value: 'EnabledV9', type: REG_DWORD, data: '0'} #Configure Windows Defender SmartScreen
  - !registryValue: {path: 'HKLM\Software\Policies\Microsoft\Windows\System', value: 'EnableSmartScreen', type: REG_DWORD, data: '0'} #Configure Windows Defender SmartScreen
  - !registryKey: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\Sense', operation: delete}
  - !registryKey: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\WinDefend', operation: delete}
  - !registryKey: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\MsSecCore', operation: delete}
  - !registryKey: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\wscsvc', operation: delete}
  - !registryKey: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\WdFilter', operation: delete}
  - !registryKey: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\WdBoot', operation: delete}
  - !registryKey: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\WdNisDrv', operation: delete}
  - !registryKey: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\WdNisSvc', operation: delete}
  - !registryKey: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\MsSecWfp', operation: delete}
  - !registryKey: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\MsSecFlt', operation: delete}
  - !registryKey: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\wtd', operation: delete}
  - !registryKey: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\webthreatdefusersvc', operation: delete}
  - !registryKey: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\webthreatdefsvc', operation: delete}
  - !registryKey: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\SecurityHealthService', operation: delete}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\WTDS\Components', value: 'ServiceEnabled', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Edge', value: 'SmartScreenEnabled', type: REG_SZ, data: '0'}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\AppHost', value: 'EnableWebContentEvaluation', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer', value: 'SmartScreenEnabled', type: REG_SZ, data: 'Off'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows Defender\Spynet', value: 'SubmitSamplesConsent', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows Defender\Spynet', value: 'SpyNetReporting', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Run', value: 'SecurityHealth', operation: delete}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Run', value: 'WindowsDefender', operation: delete}
  - !file: {path: "%systemroot%\\System32\\SecurityHealthSystray.exe"}
  - !file: {path: "%systemroot%\\System32\\SecurityHealthService.exe"}
  - !file: {path: "%systemroot%\\System32\\SecurityHealthAgent.dll"}
  - !file: {path: "%systemroot%\\System32\\SecurityHealthHost.exe"}
  - !file: {path: "%systemroot%\\System32\\SecurityHealthCore.dll"}
  - !file: {path: "%systemroot%\\System32\\SecurityHealthProxyStub.dll"}
  - !file: {path: "%systemroot%\\System32\\SecurityHealthUdk.dll"}
  - !file: {path: "%ProgramW6432%\\Windows Defender Advanced Thread Protection"}
  - !file: {path: "%ProgramW6432%\\Windows Defender"}
  - !file: {path: "%PROGRAMFILES(x86)% \\Windows Defender"}
  - !file: {path: "%ProgramData%\\Microsoft\\Windows Defender"}
  - !file: {path: "%ProgramFiles(x86)%\\Windows Defender"}
  - !file: {path: "%systemroot%\\System32\\drivers\\WdNisDrv.sys"}
  - !file: {path: "%ProgramW6432%\\Windows Defender Advanced Threat Protection"}
  - !file: {path: "%SystemDrive%\\ProgramData\\Microsoft\\Windows Defender Advanced Threat Protection"}
  - !file: {path: "%ProgramW6432%\\Microsoft Update Health Tools"}
  - !file: {path: "%ProgramW6432%\\PCHealthCheck"}
  - !file: {path: "%systemroot%\\System32\\smartscreen.exe"}
  - !file: {path: "%systemroot%\\System32\\smartscreenps.dll"}
  - !registryKey: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\UpdateHealthTools'}
  - !registryKey: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\rempl'}
  - !registryKey: {path: 'HKLM\SOFTWARE\Microsoft\CloudManagedUpdate'}
  - !scheduledTask: {path: '\Microsoft\Windows\Windows Defender\Windows Defender Cache Maintenance', operation: delete}
  - !scheduledTask: {path: '\Microsoft\Windows\Windows Defender\Windows Defender Cleanup', operation: delete}
  - !scheduledTask: {path: '\Microsoft\Windows\Windows Defender\Windows Defender Scheduled Scan', operation: delete}
  - !scheduledTask: {path: '\Microsoft\Windows\Windows Defender\Windows Defender Verification', operation: delete}
  - !registryKey: {path: 'HKLM\SOFTWARE\Classes\*\ShellEx\ContextMenuHandlers\EPP', operation: delete}
  - !registryKey: {path: 'HKLM\SOFTWARE\Classes\Drive\ShellEx\ContextMenuHandlers\EPP', operation: delete}
  - !registryKey: {path: 'HKLM\SOFTWARE\Classes\Directory\ShellEx\ContextMenuHandlers\EPP', operation: delete}
  - !run: {exe: 'DISM.exe', args: '/Online /Disable-Feature /FeatureName:"Windows-Defender-Default-Definitions" /NoRestart'}

  # User Account Control
  - !status: {status: 'Disabling UAC'}
  - !service: {name: 'luafv', operation: change, startup: 4}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System', value: 'EnableLUA', type:  REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System', value: 'PromptOnSecureDesktop', type:  REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System', value: 'ConsentPromptBehaviorAdmin', type:  REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System', value: 'ValidateAdminCodeSignatures', type:  REG_DWORD, data: '0'}

  # Software
  - !status: {status: 'Installing VC Redist 2005'}
  - !download: {url: 'https://download.microsoft.com/download/8/B/4/8B42259F-5D70-43F4-AC2E-4B208FD8D66A/vcredist_x86.EXE', destination: '%temp%\2005_86.exe', overwrite: true}
  - !download: {url: 'https://download.microsoft.com/download/8/B/4/8B42259F-5D70-43F4-AC2E-4B208FD8D66A/vcredist_x64.EXE', destination: '%temp%\2005_64.exe', overwrite: true}
  - !cmd: {command: '"%temp%\2005_86.exe" /Q /C /T:%temp%\2005_86', runas: currentUserElevated, wait: true}
  - !cmd: {command: '"%temp%\2005_64.exe" /Q /C /T:%temp%\2005_64', runas: currentUserElevated, wait: true}
  - !cmd: {command: '"%temp%\2005_86\vcredist.msi" /quiet /norestart', runas: currentUserElevated, wait: true}
  - !cmd: {command: '"%temp%\2005_64\vcredist.msi" /quiet /norestart', runas: currentUserElevated, wait: true}
  - !file: {path: '%temp%\2005_86'}
  - !file: {path: '%temp%\2005_64'}
  
  - !status: {status: 'Installing VC Redist 2008'}
  - !download: {url: 'https://download.microsoft.com/download/5/D/8/5D8C65CB-C849-4025-8E95-C3966CAFD8AE/vcredist_x86.exe', destination: '%temp%\2008_86.exe', overwrite: true}
  - !download: {url: 'https://download.microsoft.com/download/5/D/8/5D8C65CB-C849-4025-8E95-C3966CAFD8AE/vcredist_x64.exe', destination: '%temp%\2008_64.exe', overwrite: true}
  - !cmd: {command: '"%temp%\2008_86.exe" /q', runas: currentUserElevated, wait: true}
  - !cmd: {command: '"%temp%\2008_64.exe" /q', runas: currentUserElevated, wait: true}

  - !status: {status: 'Installing VC Redist 2010'}
  - !download: {url: 'https://download.microsoft.com/download/1/6/5/165255E7-1014-4D0A-B094-B6A430A6BFFC/vcredist_x86.exe', destination: '%temp%\2010_86.exe', overwrite: true}
  - !download: {url: 'https://download.microsoft.com/download/1/6/5/165255E7-1014-4D0A-B094-B6A430A6BFFC/vcredist_x64.exe', destination: '%temp%\2010_64.exe', overwrite: true}
  - !cmd: {command: '"%temp%/2010_86.exe" /q', runas: currentUserElevated, wait: true}
  - !cmd: {command: '"%temp%/2010_64.exe" /q', runas: currentUserElevated, wait: true}

  - !status: {status: 'Installing VC Redist 2012'}
  - !download: {url: 'https://download.microsoft.com/download/1/6/B/16B06F60-3B20-4FF2-B699-5E9B7962F9AE/VSU_4/vcredist_x86.exe', destination: '%temp%\2012_86.exe', overwrite: true}
  - !download: {url: 'https://download.microsoft.com/download/1/6/B/16B06F60-3B20-4FF2-B699-5E9B7962F9AE/VSU_4/vcredist_x64.exe', destination: '%temp%\2012_64.exe', overwrite: true}
  - !cmd: {command: '"%temp%\2012_86.exe" /install /quiet /norestart', runas: currentUserElevated, wait: true}
  - !cmd: {command: '"%temp%\2012_64.exe" /install /quiet /norestart', runas: currentUserElevated, wait: true}

  - !status: {status: 'Installing VC Redist 2013'}
  - !download: {url: 'https://aka.ms/highdpimfc2013x86enu', destination: '%temp%\2013_86.exe', overwrite: true}
  - !download: {url: 'https://aka.ms/highdpimfc2013x64enu', destination: '%temp%\2013_64.exe', overwrite: true}
  - !cmd: {command: '"%temp%\2013_86.exe" /install /quiet /norestart', runas: currentUserElevated, wait: true}
  - !cmd: {command: '"%temp%\2013_64.exe" /install /quiet /norestart', runas: currentUserElevated, wait: true}

  - !status: {status: 'Installing VC Redist 2015-2022'}
  - !download: {url: 'https://aka.ms/vs/17/release/vc_redist.x86.exe', destination: '%temp%\2015_2022_86.exe', overwrite: true}
  - !download: {url: 'https://aka.ms/vs/17/release/vc_redist.x64.exe', destination: '%temp%\2015_2022_64.exe', overwrite: true}
  - !cmd: {command: '"%temp%\2015_2022_86.exe" /install /quiet /norestart', runas: currentUserElevated, wait: true}
  - !cmd: {command: '"%temp%\2015_2022_64.exe" /install /quiet /norestart', runas: currentUserElevated, wait: true}

  - !status: {status: 'Installing DirectX'}
  - !download: {url: 'https://download.microsoft.com/download/8/4/A/84A35BF1-DAFE-4AE8-82AF-AD2AE20B6B14/directx_Jun2010_redist.exe', destination: '%temp%\DirectX.exe', overwrite: true}
  - !cmd: {command: '"%temp%\DirectX.exe" /Q /C /T:%temp%\DirectX', runas: currentUserElevated, wait: true}
  - !cmd: {command: '"%temp%\DirectX\DXSETUP.exe" /silent', runas: currentUserElevated, wait: true}
  - !file: {path: '%temp%\DirectX'}

  - !status: {status: 'Installing 7Zip'}
  - !download: {git: 'https://github.com/ip7z/7zip', regex: '^7z.*-x64\.exe$', destination: '%temp%\7Zip.exe', overwrite: true}
  - !cmd: {command: '"%temp%\7Zip.exe" /S', runas: currentUserElevated, wait: true}

  - !status: {status: 'Configuring 7-Zip'}
  - !registryValue: {path: 'HKCU\Software\7-Zip\FM\Columns', value: 'RootFolder', type: REG_BINARY, data: '0100000000000000010000000400000001000000a0000000'}
  - !registryValue: {path: 'HKCU\Software\7-Zip\Options', value: 'ContextMenu', type: REG_DWORD, data: '4903'}
  - !registryValue: {path: 'HKCU\Software\7-Zip\Options', value: 'ElimDupExtract', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\Software\Classes\.001', value: '', type: REG_SZ, data: '7-Zip.001'}
  - !registryValue: {path: 'HKCU\Software\Classes\.7z', value: '', type: REG_SZ, data: '7-Zip.7z'}
  - !registryValue: {path: 'HKCU\Software\Classes\.arj', value: '', type: REG_SZ, data: '7-Zip.arj'}
  - !registryValue: {path: 'HKCU\Software\Classes\.bz2', value: '', type: REG_SZ, data: '7-Zip.bz2'}
  - !registryValue: {path: 'HKCU\Software\Classes\.bzip2', value: '', type: REG_SZ, data: '7-Zip.bzip2'}
  - !registryValue: {path: 'HKCU\Software\Classes\.cab', value: '', type: REG_SZ, data: '7-Zip.cab'}
  - !registryValue: {path: 'HKCU\Software\Classes\.cpio', value: '', type: REG_SZ, data: '7-Zip.cpio'}
  - !registryValue: {path: 'HKCU\Software\Classes\.deb', value: '', type: REG_SZ, data: '7-Zip.deb'}
  - !registryValue: {path: 'HKCU\Software\Classes\.dmg', value: '', type: REG_SZ, data: '7-Zip.dmg'}
  - !registryValue: {path: 'HKCU\Software\Classes\.fat', value: '', type: REG_SZ, data: '7-Zip.fat'}
  - !registryValue: {path: 'HKCU\Software\Classes\.gz', value: '', type: REG_SZ, data: '7-Zip.gz'}
  - !registryValue: {path: 'HKCU\Software\Classes\.gzip', value: '', type: REG_SZ, data: '7-Zip.gzip'}
  - !registryValue: {path: 'HKCU\Software\Classes\.hfs', value: '', type: REG_SZ, data: '7-Zip.hfs'}
  - !registryValue: {path: 'HKCU\Software\Classes\.iso', value: '', type: REG_SZ, data: '7-Zip.iso'}
  - !registryValue: {path: 'HKCU\Software\Classes\.lha', value: '', type: REG_SZ, data: '7-Zip.lha'}
  - !registryValue: {path: 'HKCU\Software\Classes\.lzh', value: '', type: REG_SZ, data: '7-Zip.lzh'}
  - !registryValue: {path: 'HKCU\Software\Classes\.lzma', value: '', type: REG_SZ, data: '7-Zip.lzma'}
