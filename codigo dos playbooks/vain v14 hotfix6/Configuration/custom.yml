  - !status: {status: 'Applying Tweaks'}

  # Disable Service Host Split
  - !registryValue: {path: 'HKLM\SYSTEM\ControlSet001\Control', value: 'SvcHostSplitThresholdInKB', type:  REG_DWORD, data: '4294967295'}

  # Disable Sleep Study
  - !run: {exe: 'wevtutil.exe',args: 'set-log "Microsoft-Windows-SleepStudy/Diagnostic" /e:false'}
  - !run: {exe: 'wevtutil.exe', args: 'set-log "Microsoft-Windows-Kernel-Processor-Power/Diagnostic" /e:false'}
  - !run: {exe: 'wevtutil.exe', args: 'set-log "Microsoft-Windows-UserModePowerService/Diagnostic" /e:false'}
  - !scheduledTask: {path: '\Microsoft\Windows\Power Efficiency Diagnostics\AnalyzeSystem', operation: disable}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\Power', value: 'SleepStudyDisabled', type: REG_DWORD, data: '1'} #

  # Gamedvr
  - !registryValue: {path: 'HKCU\System\GameConfigStore', value: 'GameDVR_DSEBehavior', type: REG_DWORD, data: '2'}
  - !registryValue: {path: 'HKCU\System\GameConfigStore', value: 'GameDVR_DXGIHonorFSEWindowsCompatible', type: REG_DWORD, data: '0'}
  - !registryValue: {path: 'HKCU\System\GameConfigStore', value: 'GameDVR_FSEBehavior', type: REG_DWORD, data: '2'}
  - !registryValue: {path: 'HKCU\System\GameConfigStore', value: 'GameDVR_FSEBehaviorMode', type: REG_DWORD, data: '1'}
  - !registryValue: {path: 'HKCU\System\GameConfigStore', value: 'GameDVR_HonorUserFSEBehaviorMode', type: REG_DWORD, data: '1'}

  # Enable Write Cache
  - !cmd: {command: '(for /f "delims=" %k in (''Reg.exe Query hklm\SYSTEM\CurrentControlSet\Enum /f "{4d36e967-e325-11ce-bfc1-08002be10318}" /d /s ^| Find "HKEY" '') do Reg.exe add "%k\Device Parameters\Disk" /v UserWriteCacheSetting /t reg_dword /d 1 /f & Reg.exe add "%k\Device Parameters\Disk" /v CacheIsPowerProtected /t reg_dword /d 1 /f) >nul 2>&1', exeDir: true, wait: true, runas: currentUserElevated}
  
  # NTFS
  - !run: {exe: 'fsutil', args: 'behavior set disablelastaccess 1'}
  - !run: {exe: 'fsutil', args: 'behavior set disable8dot3 1'}
  - !run: {exe: 'fsutil', args: 'behavior set disabledeletenotify 0'}
  - !run: {exe: 'fsutil', args: 'behavior set encryptpagingfile 0'}
  - !run: {exe: 'fsutil', args: 'behavior set disablecompression 1'}
  - !run: {exe: 'fsutil', args: 'behavior set enablenonpagedntfs 1'}
  - !run: {exe: 'fsutil', args: 'usn deletejournal /d C:'}

