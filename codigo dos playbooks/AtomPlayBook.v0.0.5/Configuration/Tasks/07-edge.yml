---
title: Edge
description: Fully remove Microsoft Edge - services, AppX, files, registry, scheduled tasks, WebView
privilege: TrustedInstaller
option: remove-edge
actions:

  - !status: {status: 'Removing Microsoft Edge...'}

  # KILL ALL EDGE PROCESSES
  - !taskKill: {name: 'msedge', errorAction: Ignore}
  - !taskKill: {name: 'msedgewebview2', errorAction: Ignore}
  - !taskKill: {name: 'MicrosoftEdge*', errorAction: Ignore}
  - !taskKill: {name: 'MicrosoftEdgeUpdate', errorAction: Ignore}
  - !taskKill: {name: 'MicrosoftEdgeElevationService', errorAction: Ignore}

  # DELETE EDGE SERVICES
  - !service: {name: 'edgeupdate', operation: delete, errorAction: Ignore}
  - !service: {name: 'edgeupdatem', operation: delete, errorAction: Ignore}
  - !service: {name: 'MicrosoftEdgeElevationService', operation: delete, errorAction: Ignore}
  - !service: {name: 'MicrosoftEdgeUpdateService', operation: delete, errorAction: Ignore}

  # UNINSTALL EDGE VIA SETUP.EXE (hidden window + kill spawned browser)
  - !powerShell:
    command: >-
      $edgeUpdate = "${env:ProgramFiles(x86)}\Microsoft\EdgeUpdate\MicrosoftEdgeUpdate.exe";
      if (Test-Path $edgeUpdate) {
        Start-Process $edgeUpdate -ArgumentList '/uninstall','/system-level','/force-uninstall' -WindowStyle Hidden -Wait
      }
      Start-Sleep -Seconds 3;
      Get-Process -Name 'msedge','MicrosoftEdgeUpdate' -ErrorAction SilentlyContinue | Stop-Process -Force
    errorAction: Ignore

  # REMOVE EDGE APPX PACKAGES
  - !appx: {name: 'Microsoft.MicrosoftEdge.Stable*', type: family, errorAction: Ignore}
  - !appx: {name: 'Microsoft.MicrosoftEdgeDevToolsClient*', type: family, errorAction: Ignore}
  - !appx: {name: 'Microsoft.Edge*', type: family, errorAction: Ignore}
  - !appx: {name: 'MicrosoftEdge*', type: family, errorAction: Ignore}
  - !appx: {name: 'Microsoft.MicrosoftEdge.Beta*', type: family, errorAction: Ignore}
  - !appx: {name: 'Microsoft.MicrosoftEdge.Canary*', type: family, errorAction: Ignore}
  - !appx: {name: 'Microsoft.MicrosoftEdgeDev*', type: family, errorAction: Ignore}

  # REMOVE EDGE FILES - ALL LOCATIONS
  - !powerShell:
    command: >-
      $paths = @(
        "$env:SystemDrive\Users\Public\Desktop\Microsoft Edge.lnk",
        "$env:ProgramData\Microsoft\Windows\Start Menu\Programs\Microsoft Edge.lnk",
        "$env:APPDATA\Microsoft\Windows\Start Menu\Programs\Microsoft Edge.lnk",
        "$env:SystemRoot\system32\MicrosoftEdgeBCHost.exe",
        "$env:SystemRoot\system32\MicrosoftEdgeCP.exe",
        "$env:SystemRoot\system32\MicrosoftEdgeDevTools.exe",
        "$env:SystemRoot\system32\MicrosoftEdgeSH.exe",
        "$env:SystemRoot\system32\ie_storagetrusted.exe",
        "$env:SystemRoot\system32\MicrosoftEdgeCPBroker.exe",
        "${env:ProgramFiles(x86)}\Microsoft\Edge",
        "${env:ProgramFiles(x86)}\Microsoft\EdgeUpdate",
        "${env:ProgramFiles(x86)}\Microsoft\EdgeCore",
        "${env:ProgramFiles}\Microsoft\Edge",
        "${env:ProgramFiles}\Microsoft\EdgeUpdate",
        "${env:ProgramFiles}\Microsoft\EdgeCore",
        "$env:LOCALAPPDATA\Microsoft\Edge",
        "$env:LOCALAPPDATA\Microsoft\EdgeUpdate",
        "$env:LOCALAPPDATA\Microsoft\EdgeWebView",
        "$env:LOCALAPPDATA\Microsoft\EdgeCrashReports",
        "$env:APPDATA\Microsoft\Edge"
      );
      foreach ($p in $paths) {
        if (Test-Path $p) {
          try { Remove-Item $p -Recurse -Force -ErrorAction SilentlyContinue } catch {}
        }
      }
    errorAction: Ignore

  # REMOVE EDGE REGISTRY
  - !registryKey: {path: 'HKLM\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\Microsoft Edge', operation: delete, errorAction: Ignore}
  - !registryKey: {path: 'HKLM\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\Microsoft Edge Update', operation: delete, errorAction: Ignore}
  - !registryKey: {path: 'HKLM\SOFTWARE\Microsoft\Edge', operation: delete, errorAction: Ignore}
  - !registryKey: {path: 'HKLM\SOFTWARE\WOW6432Node\Microsoft\Edge', operation: delete, errorAction: Ignore}
  - !registryKey: {path: 'HKCR\MSEdgePDF', operation: delete, errorAction: Ignore}
  - !registryKey: {path: 'HKCR\MSEdgeMHT', operation: delete, errorAction: Ignore}
  - !registryKey: {path: 'HKLM\SOFTWARE\Clients\StartMenuInternet\Microsoft Edge', operation: delete, errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SOFTWARE\RegisteredApplications', value: 'Microsoft Edge', operation: delete, errorAction: Ignore}
  - !registryKey: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\App Paths\msedge.exe', operation: delete, errorAction: Ignore}
  - !registryKey: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\msedge.exe', operation: delete, errorAction: Ignore}
  - !registryKey: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\msedgewebview2.exe', operation: delete, errorAction: Ignore}

  # Prevent Edge reinstall
  - !registryValue: {path: 'HKLM\Software\Policies\Microsoft\EdgeUpdate', value: 'InstallDefault', data: '0', type: REG_DWORD, errorAction: Ignore}
  - !registryValue: {path: 'HKLM\Software\Policies\Microsoft\EdgeUpdate', value: 'UpdateDefault', data: '0', type: REG_DWORD, errorAction: Ignore}
  - !registryValue: {path: 'HKLM\Software\Policies\Microsoft\EdgeUpdate', value: 'CreateDesktopShortcutDefault', data: '0', type: REG_DWORD, errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\EdgeUpdate', value: 'DoNotUpdateToEdgeWithChromium', data: '1', type: REG_DWORD, errorAction: Ignore}

  # Block Edge via App execution aliases
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Advanced\AppExecutionAlias\msedge', value: 'AppExecutionAlias', data: '', operation: delete, errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Advanced\AppExecutionAlias\msedgebeta', value: 'AppExecutionAlias', data: '', operation: delete, errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Advanced\AppExecutionAlias\msedgecanary', value: 'AppExecutionAlias', data: '', operation: delete, errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Advanced\AppExecutionAlias\msedgewebview', value: 'AppExecutionAlias', data: '', operation: delete, errorAction: Ignore}

  # REMOVE EDGE SCHEDULED TASKS
  - !cmd:
    command: 'schtasks /Delete /TN "\Microsoft\EdgeUpdate\*" /F 2>nul'
    errorAction: Ignore
  - !powerShell:
    command: 'Get-ScheduledTask | Where-Object { $_.TaskName -like ''*MicrosoftEdge*'' -or $_.TaskName -like ''*EdgeUpdate*'' -or $_.TaskPath -like ''*MicrosoftEdge*'' } | ForEach-Object { Unregister-ScheduledTask -TaskName $_.TaskName -Confirm:$false -ErrorAction SilentlyContinue }'
    runas: currentUserElevated
    errorAction: Ignore

  # REMOVE EDGE WEBVIEW2 (hidden window + kill spawned browser)
  - !powerShell:
    command: >-
      $wv2 = "${env:ProgramFiles(x86)}\Microsoft\EdgeWebView\Installer\MicrosoftEdgeWebView2RuntimeInstaller.exe";
      if (Test-Path $wv2) {
        Start-Process $wv2 -ArgumentList '--uninstall','--system-level','--force-uninstall' -WindowStyle Hidden -Wait
      }
      Start-Sleep -Seconds 2;
      Get-Process -Name 'msedgewebview2' -ErrorAction SilentlyContinue | Stop-Process -Force
    errorAction: Ignore

  # BLOCK EDGE PROTOCOL HANDLERS
  - !registryKey: {path: 'HKLM\SOFTWARE\Classes\microsoft-edge', operation: delete, errorAction: Ignore}
  - !registryKey: {path: 'HKLM\SOFTWARE\Classes\MSEdgeHTM', operation: delete, errorAction: Ignore}
  - !registryKey: {path: 'HKCR\microsoft-edge', operation: delete, errorAction: Ignore}
