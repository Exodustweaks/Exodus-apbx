---
title: Wallpaper
description: Privacy+ wallpaper + start menu cleanup (exact WALLPAPER.bat replication)
privilege: TrustedInstaller
actions:

  - !status: {status: 'Applying wallpaper (Privacy+ method)...'}

  # RESET AERO.THEME PERMISSIONS
  - !run:
    exeDir: true
    exe: 'NSudoLC.exe'
    args: '-U:T -P:E -M:S -Priority:RealTime -UseCurrentConsole -Wait icacls.exe "%WINDIR%\Resources\Themes\aero.theme" /reset /t'
    errorAction: Ignore

  # APPLY WALLPAPER + START MENU CLEANUP (single script)
  - !run:
    exeDir: true
    exe: 'PowerShell.exe'
    args: '-NoProfile -ExecutionPolicy Bypass -File WALLPAPER-APPLY.ps1'
    wait: true
    runas: currentUserElevated
    errorAction: Ignore

  # DISABLE SPOTLIGHT (registry, separate for reliability)
  - !registryValue: {path: 'HKCU\SOFTWARE\Policies\Microsoft\Windows\CloudContent', value: 'DisableSpotlightCollectionOnDesktop', type: REG_DWORD, data: 1, errorAction: Ignore}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: 'RotatingLockScreenEnabled', type: REG_DWORD, data: 0, errorAction: Ignore}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: 'RotatingLockScreenOverlayEnabled', type: REG_DWORD, data: 0, errorAction: Ignore}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: 'SubscribedContent-338387Enabled', type: REG_DWORD, data: 0, errorAction: Ignore}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: 'SubscribedContent-353694Enabled', type: REG_DWORD, data: 0, errorAction: Ignore}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: 'SubscribedContent-353696Enabled', type: REG_DWORD, data: 0, errorAction: Ignore}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: 'SubscribedContent-310093Enabled', type: REG_DWORD, data: 0, errorAction: Ignore}
  - !registryValue: {path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\ContentDeliveryManager', value: 'SystemPaneSuggestionsEnabled', type: REG_DWORD, data: 0, errorAction: Ignore}
