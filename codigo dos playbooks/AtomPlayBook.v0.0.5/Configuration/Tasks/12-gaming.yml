---
title: Gaming
description: Extreme gaming optimization - timer, C-states, GPU, IFEO, svchost, AFD
privilege: TrustedInstaller
actions:

  - !status: {status: 'Applying gaming optimizations...'}

  # TIMER RESOLUTION - force consistent timer tick
  - !run: {exe: 'bcdedit', args: '/set disabledynamictick yes', errorAction: Ignore}
  - !run: {exe: 'bcdedit', args: '/set useplatformtick yes', errorAction: Ignore}
  - !run: {exe: 'bcdedit', args: '/set tscsyncpolicy enhanced', errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\kernel', value: 'GlobalTimerResolutionRequests', type: REG_DWORD, data: '1', errorAction: Ignore}

  # POWER SAVING - disable ALL power saving for lowest latency
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\pci\Parameters', value: 'ASPMOverride', type: REG_DWORD, data: '1', errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\USB', value: 'SelectiveSuspendEnabled', type: REG_DWORD, data: '0', errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\storahci\Parameters\Device', value: 'HIPM', type: REG_DWORD, data: '0', errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\storahci\Parameters\Device', value: 'DIPM', type: REG_DWORD, data: '0', errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\nvme\Parameters\Device', value: 'EnableAPST', type: REG_DWORD, data: '0', errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\Power\PowerSettings\54533251-82be-4824-96c1-47b60b740d00\0cc5b647-c1df-4637-891a-dec35c318583', value: 'Attributes', type: REG_DWORD, data: '2', errorAction: Ignore}

  # CPU minimum/maximum states - ensure max performance
  - !powerShell:
    command: >-
      powercfg /setacvalueindex SCHEME_CURRENT SUB_PROCESSOR PROCTHROTTLEMIN 100;
      powercfg /setacvalueindex SCHEME_CURRENT SUB_PROCESSOR PROCTHROTTLEMAX 100;
      powercfg /setactive SCHEME_CURRENT
    errorAction: Ignore

  # GPU - disable TDR, enable GPU scheduling, force max perf
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\GraphicsDrivers', value: 'TdrDelay', type: REG_DWORD, data: '10', errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\GraphicsDrivers', value: 'TdrLevel', type: REG_DWORD, data: '0', errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\GraphicsDrivers', value: 'HwSchMode', type: REG_DWORD, data: '2', errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile\Tasks\Games', value: 'GPU Priority', type: REG_DWORD, data: '8', errorAction: Ignore}

  # IFEO - Priority injection for system processes
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\fontdrvhost.exe', value: 'CpuPriorityClass', type: REG_DWORD, data: '3', errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\ctfmon.exe', value: 'CpuPriorityClass', type: REG_DWORD, data: '3', errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\sppsvc.exe', value: 'CpuPriorityClass', type: REG_DWORD, data: '3', errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\sihost.exe', value: 'CpuPriorityClass', type: REG_DWORD, data: '3', errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\lsass.exe', value: 'CpuPriorityClass', type: REG_DWORD, data: '4', errorAction: Ignore}

  # SCHEDULING - MMCSS tuning for gaming
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile', value: 'NetworkThrottlingIndex', type: REG_DWORD, data: '4294967295', errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile', value: 'SystemResponsiveness', type: REG_DWORD, data: '0', errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile', value: 'NoLazyMode', type: REG_DWORD, data: '1', errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile', value: 'LazyModeTimeout', type: REG_DWORD, data: '0', errorAction: Ignore}

  # SVCHOST SPLITTING - prevent memory fragmentation
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control', value: 'SvcHostSplitThresholdInKB', type: REG_DWORD, data: '4294967295', errorAction: Ignore}

  # AFD NETWORK - tune network buffers for gaming
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\AFD\Parameters', value: 'DefaultReceiveWindow', type: REG_DWORD, data: '16384', errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\AFD\Parameters', value: 'DefaultSendWindow', type: REG_DWORD, data: '16384', errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\AFD\Parameters', value: 'FastCopyReceiveThreshold', type: REG_DWORD, data: '1024', errorAction: Ignore}
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\AFD\Parameters', value: 'FastSendDatagramThreshold', type: REG_DWORD, data: '1024', errorAction: Ignore}

  # WRITE CACHE - enable for all drives
  - !powerShell:
    command: >-
      Get-WmiObject Win32_DiskDrive | ForEach-Object {
        $disk = $_.Index;
        $partitions = "HKLM:\SYSTEM\CurrentControlSet\Services\disk\Enum";
        Get-ItemProperty $partitions -ErrorAction SilentlyContinue | ForEach-Object {
          $_.PSObject.Properties | Where-Object { $_.Value -like "*$disk*" } | ForEach-Object {
            $regPath = "HKLM:\SYSTEM\CurrentControlSet\Control\Class\{4d36e967-e325-11ce-bfc1-08002be10318}\$($_.Name.Substring($_.Name.LastIndexOf('\')+1))";
            if (Test-Path $regPath) {
              Set-ItemProperty $regPath -Name 'WriteCacheEnabled' -Value 1 -Type DWord -Force -ErrorAction SilentlyContinue
            }
          }
        }
      }
    errorAction: Ignore

  # INTERRUPT MODERATION - disable for network adapters
  - !powerShell:
    command: >-
      Get-NetAdapterAdvancedProperty -DisplayName "Interrupt Moderation" -ErrorAction SilentlyContinue | Set-NetAdapterAdvancedProperty -DisplayValue "Disabled" -ErrorAction SilentlyContinue
    errorAction: Ignore

  # TIMER RESOLUTION FORCE - duplicate entry (already set above)
