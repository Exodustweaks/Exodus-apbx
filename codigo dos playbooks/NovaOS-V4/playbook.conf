				</CheckboxOption>
			</Options>
		</CheckboxPage>
		<RadioImagePage DependsOn="install-browser" DefaultOption="browser-chrome">
			<Options>
				<RadioImageOption>
					<Text>Chrome</Text>
					<Name>browser-chrome</Name>
